{% extends 'base.html' %}
{% block title %}Delete Record — CPAR{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h2 style="color: #dc2626;">Delete Record</h2>
    <p>Are you sure you want to delete the record for <strong>{{ record }}</strong>?</p>
    <p class="text-muted">This action cannot be undone.</p>
    <form method="post" style="display: flex; gap: 1rem; margin-top: 1.5rem;">
      {% csrf_token %}
      <a href="{% url 'record_detail' record.pk %}" class="btn btn--ghost" style="flex:1; text-align:center;">Cancel</a>
      <button type="submit" class="btn btn--danger" style="flex:1;">Yes, Delete</button>
    </form>
  </div>
</div>
{% endblock %}
