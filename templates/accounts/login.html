{% extends 'base.html' %}
{% block title %}Login — CPAR Maternal Health{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-logo">&#9829;</span>
      <h1 class="auth-title">CPAR Maternal Health System</h1>
      <p class="auth-subtitle">Sign in to continue</p>
    </div>

    <form method="post" class="auth-form">
      {% csrf_token %}
      {% if form.errors %}
      <div class="alert alert--error">Invalid username or password. Please try again.</div>
      {% endif %}

      <div class="form-group">
        <label class="form-label" for="id_username">Username</label>
        <input
          type="text"
          id="id_username"
          name="username"
          class="form-input"
          autocomplete="username"
          autofocus
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="id_password">Password</label>
        <input
          type="password"
          id="id_password"
          name="password"
          class="form-input"
          autocomplete="current-password"
          required
        />
      </div>

      <input type="hidden" name="next" value="{{ next }}" />
      <button type="submit" class="btn btn--primary btn--full">Sign In</button>
    </form>
  </div>
</div>
{% endblock %}
